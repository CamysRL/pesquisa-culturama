<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <h1>Pesquisa Online - Culturama</h1>
    </header>
    <main>
        <section>
            <form action="" method="get">
                <fieldset>  
                    <legend>Dados Pessoais</legend> 

                    <label for="name">Nome Completo:</label>
                    <input type="text" id="name" name="userName" required>
                    <br>

                    <label for="age">Idade:</label>
                    <input type="number" id="age" name="userAge" min="12" max="100" required>
                    <br>    

                    <label for="birthDate">Data de Nascimento:</label>
                    <input type="date" id="birthDate" name="userBirthDate">
                    <br> 

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="userEmail" required>
                    <br>

                    <label for="phoneNumber">Telefone:</label>
                    <input type="tel" id="phoneNumber" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="XXXXXXXXXXX">
                    <br>

                    <label for="image">Upload de Foto:</label>
                    <input type="file" accept="image/*" id="image" name="userImage">
                </fieldset> 

                <fieldset>
                     <legend>Perfil</legend>

                    <p>Gênero:</p>
                    <input type="radio" id="genderMasculine" name="userGender" value="masculino" required>
                    <label for="genderMasculine">Masculino</label>
                    <input type="radio" id="genderFeminine" name="userGender" value="feminino" required>
                    <label for="genderFeminine">Feminino</label>
                    <input type="radio" id="genderOther" name="userGender" value="outro" required>
                    <label for="genderOther">Outro</label>
                    <br>

                    <label for="MaritalStatus">Estado Civil:</label>
                    <select name="userMaritalStatus" id="MaritalStatus" required>
                        <option value="notInformed">Selecione</option>
                        <option value="solteiro">Solteiro(a)</option>
                        <option value="casado">Casado(a)</option>
                        <option value="divorciado">Divorciado(a)</option>
                        <option value="uniao_estavel">União Estável</option>
                        <option value="viuvo">Viúvo(a)</option>
                    </select>
                    <br>

                    <label for="state">Estado:</label>
                    <select name="userState" id="state" required>
                        <option value="acre">Acre</option>
                        <option value="alagoas">Alagoas</option>
                        <option value="amapa">Amapá</option>
                        <option value="amazonas">Amazonas</option>
                        <option value="bahia">Bahia</option>
                        <option value="ceara">Ceara</option>
                        <option value="distritoFederal">Distrito Federal</option>
                        <option value="espiritoSanto">Espírito Santo</option>
                        <option value="goias">Goiás</option>
                        <option value="maranhao">Maranhão</option>
                        <option value="matoGrosso">Mato Grosso</option>
                        <option value="matoGrossoDoSul">Mato Grosso do Sul</option>
                        <option value="minasGerais">Minas Gerais</option>
                        <option value="para">Pará</option>
                        <option value="paraiba">Paraíba</option>
                        <option value="parana">Paraná</option>
                        <option value="pernambuco">Pernambuco</option>
                        <option value="piaui">Piauí</option>
                        <option value="rioDeJaneiro">Rio de Janeiro</option>
                        <option value="rioGrandeDoNorte">Rio Grande do Norte</option>
                        <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                        <option value="rondonia">Rondônia</option>
                        <option value="roraima">Roraima</option>
                        <option value="santaCatarina">Santa Catarina</option>
                        <option value="saoPaulo">São Paulo</option>
                        <option value="sergipe">Sergipe</option>
                        <option value="tocantins">Tocantins</option>
                    </select>    
                    <br>
                    
                    <label for="city">Cidade:</label>
                    <input type="text" id="city" name="userCity">
                </fieldset>

                <fieldset>
                    <legend>Hábitos</legend>

                    <p>Redes Sociais:</p>
                    <input type="checkbox" name="social" id="socialInstagram" value="instagram">
                    <label for="socialInstagram">Instagram</label>
                    <br>
                    <input type="checkbox" name="social" id="socialFacebook" value="facebook">
                    <label for="socialFacebook">Facebook</label>
                    <br>
                    <input type="checkbox" name="social" id="socialX" value="x">
                    <label for="socialX">X (Antigo Twitter)</label>
                    <br>
                    <input type="checkbox" name="social" id="socialTikTok" value="tiktok">
                    <label for="socialTikTok">TikTok</label>
                    <br>
                    <input type="checkbox" name="social" id="socialLinkedIn" value="linkedin">
                    <label for="socialLinkedIn">LinkedIn</label>
                    <br>

                    <label for="musicStyle">Estilo Musical Favorito:</label>
                    <input type="text" id="musicStyle" name="userMusicStyle" list="musicStyles">
                    <datalist id="musicStyles">
                        <option value="Rock">
                        <option value="Pop">
                        <option value="Eletrônica">
                        <option value="Samba">
                        <option value="Reggae">
                        <option value="Funk">
                        <option value="MPB">
                        <option value="Forró">
                        <option value="Axé">
                        <option value="Pagode">
                        <option value="Gospel">
                        <option value="Clássica">
                        <option value="Jazz">
                        <option value="Blues">
                        <option value="Hip-Hop">
                        <option value="Rap">
                        <option value="Country">
                        <option value="Sertanejo">
                    </datalist>
                    <br>

                    <label for="favoriteColor">Cor Favorita:</label>
                    <input type="color" id="favoriteColor" name="userFavoriteColor">
                </fieldset>

                <fieldset>
                    <legend>Opinião</legend>

                    <p>Satisfação:</p>
                    <input type="radio" id="satisfactionOtima" name="userSatisfaction" value="otima" required>
                    <label for="satisfactionOtima">Ótimo</label>
                    <input type="radio" id="satisfactionBoa" name="userSatisfaction" value="boa" required>
                    <label for="satisfactionBoa">Boa</label>
                    <input type="radio" id="satisfactionRegular" name="userSatisfaction" value="regular" required>
                    <label for="satisfactionRegular">Regular</label>
                    <input type="radio" id="satisfactionRuim" name="userSatisfaction" value="ruim" required>
                    <label for="satisfactionRuim">Ruim</label>
                    <br>

                    <label for="comment">Deixe seu comentário:</label>
                    <br>
                    <textarea id="comment" name="userComment" rows="4" cols="50" placeholder="Escreva aqui..."></textarea>
                    <br>
                </fieldset>

                <fieldset>
                    <legend>Confirmações</legend>
                    <p>Confirmação de dados:</p>
                    <input type="checkbox" id="lgpd" name="userLGPD" value="confirmed" required>
                    <label for="lgpd">Eu aceito participar da pesquisa e concordo com a coleta e tratamento de meus dados pessoais de acordo com a Lei Geral de Proteção de Dados (LGPD)</label>
                    <br>
                    <input type="checkbox" id="getResult" name="userGetResult" value="accepted">
                    <label for="getResult">Desejo receber o resultado por email</label>
                    <br>


                </fieldset>

                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
                
            </form>
        </section>
        
    </main>
    <footer>
        <p>&copy; 2026 Pesquisa Culturama. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
